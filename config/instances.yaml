  - name: "central"
    image: "zta-central-img-v1"
    memory: "32G"
    cores: 8
    image_size: "70Gi"
    tags:
      - key: "AnsibleGroup"
        value: "isolated"
    networks:
      - default
      - secondary
    services:
      # ── IdM / Identity ──
      - name: idm-http
        ports:
          - port: 80
            protocol: TCP
            targetPort: 80
            name: idm-http
      - name: idm-https
        ports:
          - port: 443
            protocol: TCP
            targetPort: 443
            name: idm-https
      - name: idm-ldap
        ports:
          - port: 389
            protocol: TCP
            targetPort: 389
            name: idm-ldap
      - name: idm-ldaps
        ports:
          - port: 636
            protocol: TCP
            targetPort: 636
            name: idm-ldaps
      - name: idm-kerberos
        ports:
          - port: 88
            protocol: TCP
            targetPort: 88
            name: idm-kerberos
      - name: idm-kpasswd
        ports:
          - port: 464
            protocol: TCP
            targetPort: 464
            name: idm-kpasswd
      # ── Keycloak ──
      - name: keycloak-http
        ports:
          - port: 8080
            protocol: TCP
            targetPort: 8080
            name: keycloak-http
      - name: keycloak-https
        ports:
          - port: 8543
            protocol: TCP
            targetPort: 8543
            name: keycloak-https
      # ── OPA ──
      - name: opa-http
        ports:
          - port: 8181
            protocol: TCP
            targetPort: 8181
            name: opa-http
      # ── Splunk ──
      - name: splunk-http
        ports:
          - port: 8000
            protocol: TCP
            targetPort: 8000
            name: splunk-http
      - name: splunk-hec
        ports:
          - port: 8088
            protocol: TCP
            targetPort: 8088
            name: splunk-hec
      - name: splunk-mgmt
        ports:
          - port: 8089
            protocol: TCP
            targetPort: 8089
            name: splunk-mgmt
      - name: splunk-fwd
        ports:
          - port: 9997
            protocol: TCP
            targetPort: 9997
            name: splunk-fwd
      #     name: ceos3-ssh
      # ── Arista cEOS switches (eAPI) ──
      - name: ceos1-eapi
        ports:
          - port: 6031
            protocol: TCP
            targetPort: 6031
            name: ceos1-eapi
      - name: ceos2-eapi
        ports:
          - port: 6032
            protocol: TCP
            targetPort: 6032
            name: ceos2-eapi
      - name: ceos3-eapi
        ports:
          - port: 6033
            protocol: TCP
            targetPort: 6033
            name: ceos3-eapi
      # ── RHEL containers (SSH) ──
      - name: db-ssh
        ports:
          - port: 2022
            protocol: TCP
            targetPort: 2022
            name: db-ssh
      - name: app-ssh
        ports:
          - port: 2023
            protocol: TCP
            targetPort: 2023
            name: app-ssh
      # ── Application stack ──
      - name: postgresql
        ports:
          - port: 5432
            protocol: TCP
            targetPort: 5432
            name: postgresql
      - name: app-http
        ports:
          - port: 8081
            protocol: TCP
            targetPort: 8081
            name: app-http
      # ── Gitea ──
      - name: gitea-http
        ports:
          - port: 3000
            protocol: TCP
            targetPort: 3000
            name: gitea-http
      # ── ZTA Dashboard ──
      - name: dashboard-http
        ports:
          - port: 5050
            protocol: TCP
            targetPort: 5050
            name: dashboard-http
    routes:
      - name: idm-https
        host: idm-https
        service: idm-http
        targetPort: 80
        tls: true
        tls_termination: Edge
      - name: splunk
        host: splunk-http
        service: splunk-http
        targetPort: 8000
        tls: true
        tls_termination: Edge
      - name: opa-http
        host: opa-http
