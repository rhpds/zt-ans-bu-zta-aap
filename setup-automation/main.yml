---
- name: Create inventory
  hosts: localhost
  gather_facts: false

  vars_files:
    - ../config/secrets.yaml  # NOTE: this is inclueded later in this document
  tasks:
  - name: Add nodes
    ansible.builtin.add_host:
      name: "{{ item }}"
      ansible_ssh_host: "{{ item }}"
      ansible_ssh_port: "{{ lookup('ansible.builtin.env', 'BASTION_PORT') }}"
      ansible_ssh_user: "{{ lookup('ansible.builtin.env', 'BASTION_USER') }}"
      ansible_ssh_pass: "{{ lookup('ansible.builtin.env', 'BASTION_PASSWORD') }}"
      ansible_become_password: "{{ lookup('ansible.builtin.env', 'BASTION_PASSWORD') }}"
      ansible_python_interpreter: /usr/libexec/platform-python
    loop:
      - control
      - vault
      - central
      - netbox

- name: Demo Playbook for the ansible-runner API
  hosts: all:!localhost
  gather_facts: false
  vars:
    satellite_url: "{{ lookup('ansible.builtin.env', 'SATELLITE_URL') }}"
    satellite_org: "{{ lookup('ansible.builtin.env', 'SATELLITE_ORG') }}"
    satellite_activationkey: "{{ lookup('ansible.builtin.env', 'SATELLITE_ACTIVATIONKEY') }}"
    guid: "{{ lookup('ansible.builtin.env', 'GUID') }}"
    domain: "{{ lookup('ansible.builtin.env', 'DOMAIN') }}"
  tasks:
  - name: "waiting for the port tcp/22 to be open"
    ansible.builtin.wait_for_connection:

  - name: Set config_host variable with ansible_host value
    ansible.builtin.set_fact:
      config_host: "{{ ansible_host }}"

  - name: unreg | Unregister From Subscription Manager
    ansible.builtin.command: subscription-manager unregister
    register: r_unregister
    failed_when: >-
      r_unregister is failed and
      r_unregister.stderr | default('') != 'This system is currently not registered.'
    ignore_errors: true

  - name: sat | Install Satellite CA certificate package
    yum:
      name: "https://{{ satellite_url }}/pub/katello-ca-consumer-latest.noarch.rpm"
      state: present
      disablerepo: "*"
      disable_gpg_check: true
    register: r_install_satellite_ca_rpm
    until: not r_install_satellite_ca_rpm.failed
    retries: 10
    delay: 10
  
  # prutledg - package profile reporting is slamming the satellite server and not necessary
  - name: sat | Disable Reporting Of Package Profile to Satellite
    ini_file:
      path: /etc/rhsm/rhsm.conf
      section: rhsm
      option: report_package_profile
      value: "0"
  
  - name: sat | Run setup if gather_facts hasn't been run
    setup:
      gather_subset: min
    when: ansible_date_time is not defined
  
  - name: sat | Set set_repositories_subscription_hostname with randomization
    when: set_repositories_subscription_hostname is not defined
    set_fact:
      set_repositories_subscription_hostname: |
        {{ inventory_hostname }}.{{ guid }}.internal-{{ ansible_date_time.iso8601_basic | lower }}
  
  - name: sat | Set network.fqdn in /etc/rhsm/facts/katello.facts
    copy:
      dest: /etc/rhsm/facts/katello.facts
      content: "{{ __content | to_json }}"
    vars:
      __content: >-
        {{
          {"network.fqdn": set_repositories_subscription_hostname }
        }}
  
  - name: sat | Register with activation-key with HA
    community.general.redhat_subscription:
      state: present
      consumer_name: "{{ set_repositories_subscription_hostname }}"
      server_hostname: "{{ satellite_url }}"
      server_port: "443"
      server_prefix: /rhsm
      rhsm_baseurl: "https://{{ satellite_url }}/pulp/repos"
      activationkey: "{{ satellite_activationkey }}"
      org_id: "{{ satellite_org }}"
      force_register: "true"
  
  - name: sat | Enable RHSM to manage repositories
    command: subscription-manager config --rhsm.manage_repos=1
  
  - name: sat | Enable repos
    rhsm_repository:
      name: "*"
      state: enabled
    when:
    - use_content_view
    - set_repositories_satellite_activationkey != ''

  - name: Create a directory if it does not exist
    ansible.builtin.file:
      path: "/tmp/setup-scripts/"
      state: directory
      mode: '0755'

  - name: Check if setup-server.sh exists
    ansible.builtin.stat:
      path: "./setup-{{ config_host }}.sh"
    delegate_to: localhost
    register: r_script_test

  - name: Copy script file
    when: r_script_test.stat.exists
    ansible.builtin.copy:
      src: "./setup-{{ ansible_host }}.sh"
      dest: "/tmp/setup-scripts/setup-{{ ansible_host }}.sh"
    register: r_result

  - name: Include secrets var
    ansible.builtin.include_vars: ../config/secrets.yaml

  - name: Execute setup-node.sh if it exists
    when: r_script_test.stat.exists
    ansible.builtin.shell: "sh -x /tmp/setup-scripts/setup-{{ ansible_host }}.sh > /tmp/setup-scripts/setup-{{ ansible_host }}.log 2>&1"
    become: true
    register: r_result
    environment:
      SATELLITE_URL: "{{ satellite_url }}"
      SATELLITE_ORG: "{{ satellite_org }}"
      SATELLITE_ACTIVATIONKEY: "{{ satellite_activationkey }}"
      GUID: "{{ guid }}"
      DOMAIN: "{{ domain }}"
      REG_KEY: "{{ reg_username }}"
      REG_PASS: "{{ reg_password }}"
      SSH_KEY: "{{ ssh_key }}"
      VAULT_LIC: "{{ vaultlic }}"
      AH_TOKEN: "{{ ahtoken }}"

  - name: Output script result
    ansible.builtin.debug:
      var: r_result.stdout
    when: r_script_test.stat.exists

  - name: Write script result to file
    ansible.builtin.copy:
      content: "{{ r_result.stdout | default(r_result.stderr) | default(r_result) }}"
      dest: "/tmp/{{ ansible_host }}-setup-script.out"
    delegate_to: localhost
    when:
    - r_result is defined

  - name: Output script result
    ansible.builtin.debug:
      var: r_result
    when: r_result is defined

  - name: Fail if stage was failed
    ansible.builtin.fail:
      msg: "Setup failed"
    when:
    - r_result is defined
    - r_result.rc != 0
